<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Love Forever</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* --- Base page --- */
    body {
      background: #000;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    /* --- Love words --- */
    #ui .love {
      position: absolute;
      top: 50%;
      left: 50%;
      margin: -225px 0 0 -225px;
      --i: 1;
    }
    #ui .love:last-child .love_word {
      color: #ea80b0;
      font-size: 1.4rem;
      text-shadow: 0 0 10px #fff;
    }

    #ui .love_word {
      color: #ea80b0;
      font-size: 1.4rem;
      transform: translateY(-100%) rotateZ(-30deg);
      text-shadow: 0 0 10px #fff;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    #ui .love_horizontal {
      animation: horizontal 10000ms infinite alternate ease-in-out;
      animation-delay: calc(var(--i) * -300ms);
    }
    #ui .love_vertical {
      animation: vertical 20000ms infinite linear;
      animation-delay: calc(var(--i) * -300ms);
    }

    @keyframes horizontal {
      from { transform: translateX(0px); }
      to   { transform: translateX(450px); }
    }
    @keyframes vertical {
      0%   { transform: translateY(180px); }
      10%  { transform: translateY(45px); }
      15%  { transform: translateY(4.5px); }
      18%  { transform: translateY(0px); }
      20%  { transform: translateY(4.5px); }
      22%  { transform: translateY(34.61538px); }
      24%  { transform: translateY(64.28571px); }
      25%  { transform: translateY(112.5px); }
      26%  { transform: translateY(64.28571px); }
      28%  { transform: translateY(34.61538px); }
      30%  { transform: translateY(4.5px); }
      32%  { transform: translateY(0px); }
      35%  { transform: translateY(4.5px); }
      40%  { transform: translateY(45px); }
      50%  { transform: translateY(180px); }
      71%  { transform: translateY(428.57143px); }
      72.5%{ transform: translateY(441.17647px); }
      75%  { transform: translateY(450px); }
      77.5%{ transform: translateY(441.17647px); }
      79%  { transform: translateY(428.57143px); }
      100% { transform: translateY(180px); }
    }

    /* --- Play button overlay (shown if autoplay blocked) --- */
    #play-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #play-overlay.visible {
      display: flex;
    }
    #play-overlay button {
      background: #ea80b0;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 30px #ea80b0aa;
      transition: transform 0.2s;
    }
    #play-overlay button:hover {
      transform: scale(1.07);
    }
    #play-overlay p {
      color: #ea80b0;
      font-size: 1rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Hidden audio element — starts at 2:20 = 140 seconds -->
  <audio id="bg-audio" preload="auto">
    <source src="angel.mp3" type="audio/mpeg">
  </audio>

  <!-- Fallback play button if browser blocks autoplay -->
  <div id="play-overlay">
    <p>♪ Click to start the music ♪</p>
    <button id="play-btn">▶ Play</button>
  </div>

  <div id="ui"></div>

  <script>
    // ── Floating words ──────────────────────────────────────────
    const N = 100;
    const ui = document.getElementById('ui');

    for (let i = 1; i <= N; i++) {
      const love = document.createElement('div');
      love.className = 'love';
      love.style.setProperty('--i', i);

      const h = document.createElement('div');
      h.className = 'love_horizontal';

      const v = document.createElement('div');
      v.className = 'love_vertical';

      const word = document.createElement('div');
      word.className = 'love_word';
      word.textContent = 'Big Love For Mohammed';

      v.appendChild(word);
      h.appendChild(v);
      love.appendChild(h);
      ui.appendChild(love);
    }

    // ── Audio: start at 2:20 (140 seconds) ─────────────────────
    const audio   = document.getElementById('bg-audio');
    const overlay = document.getElementById('play-overlay');
    const playBtn = document.getElementById('play-btn');

    function startAudio() {
      const promise = audio.play();
      if (promise !== undefined) {
        promise.catch(() => {
          // Autoplay blocked — show the overlay button
          overlay.classList.add('visible');
        });
      }
    }

    playBtn.addEventListener('click', () => {
      overlay.classList.remove('visible');
      audio.play();
    });

    // Try autoplay on load
    window.addEventListener('load', startAudio);
  </script>
</body>
</html>
